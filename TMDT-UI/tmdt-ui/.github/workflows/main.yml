name: CI/CD Pipeline cho TMĐT Storefront

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout mã nguồn
      uses: actions/checkout@v4

    - name: Cài đặt Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18.x'
        cache: 'npm'

    - name: Cài đặt thư viện
      run: npm ci

    - name: Khởi tạo Prisma Client
      run: npx prisma generate

    - name: Kiểm tra lỗi cú pháp (Lint)
      run: npm run lint

    - name: Build dự án Next.js
      run: npm run build
      env:
        DATABASE_URL: "postgresql://dummy:dummy@localhost:5432/dummy" # Database ảo để pass quá trình build